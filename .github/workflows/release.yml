name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@b7246b12e77f7134dc2d460a3d5bad15bbe29390 #v4.1.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Build chart dependencies
        run: |
          for chart in charts/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency update "$chart"
            fi
          done

      - name: Add Helm repositories
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          
      - name: Package chart
        run: |
          helm package charts/${{ github.ref_name }} -d .cr-release-packages

      - name: Release
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 #v2.4.1
        with:
          prerelease: true
          generate_release_notes: true
          append_body: true
          tag_name: ${{ github.ref_name }}
          files: .cr-release-packages/*.tgz
      
      - name: Update Helm index
        run: |
          # Checkout gh-pages branch
          git config user.name "$GITHUB_ACTOR"
          
          git checkout gh-pages
          git pull
          
          cp .cr-release-packages/*.tgz .
          git add *.tgz
          git commit -m "Add chart packages"
          git push
          
          # Download chart-releaser
          curl -sSL https://github.com/helm/chart-releaser/releases/download/v1.8.1/chart-releaser_1.8.1_linux_amd64.tar.gz | tar xz
          
          # Generate/update index
          ./cr index \
            --owner ${{ github.repository_owner }} \
            --git-repo ${{ github.event.repository.name }} \
            --package-path .cr-release-packages \
            --pages-branch gh-pages
            --index-path . \
            --release-name-template="v{{ .Version }}"
            --push
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"